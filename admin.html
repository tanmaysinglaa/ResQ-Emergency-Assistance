<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResQ | Admin Command Center</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="admin-body">

  <div id="loginScreen" class="login-wrapper">
  <div class="login-box">
    
    <div class="login-visual">
      <div class="visual-content">
        <i class="fas fa-shield-alt fa-4x"></i>
        <h2>ResQ Command</h2>
        <p>Restricted Access Only</p>
      </div>
    </div>

    <div class="login-form-section">
      <div class="form-header">
        <h3>Welcome Back</h3>
        <p>Please authenticate to continue.</p>
      </div>

      <form id="loginForm">
        <div class="input-group-modern">
          <i class="fas fa-key"></i>
          <input type="password" id="adminPassword" placeholder="Enter Access Key" required>
        </div>
        
        <button type="submit" class="btn-login-modern">
          <span>Login to Dashboard</span> <i class="fas fa-arrow-right"></i>
        </button>
        
        <div id="loginError" class="error-pill">
          <i class="fas fa-times-circle"></i> <span>Invalid Password</span>
        </div>
      </form>

      <div class="login-footer">
        <a href="index.html" class="back-link">
          <i class="fas fa-chevron-left"></i> Back to Public Site
        </a>
      </div>
    </div>
  </div>
</div>

  <div id="adminDashboard" class="dashboard-wrapper" style="display: none;">
    
    <nav class="side-nav">
      <div class="nav-logo">
        <i class="fas fa-ambulance"></i> <span>ResQ Admin</span>
      </div>
      <ul>
        <li class="active" onclick="showTab('requests')"><i class="fas fa-list-ul"></i> Requests</li>
        <li onclick="showTab('helpers')"><i class="fas fa-hand-holding-heart"></i> Volunteers</li>
        <li onclick="showTab('map-view')"><i class="fas fa-map-location-dot"></i> Live Map</li>
      </ul>
      <div class="nav-bottom">
        <button onclick="logout()" class="btn-logout-alt"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <header class="content-header">
        <h2>Dashboard Overview</h2>
        <div class="admin-actions">
          <button onclick="loadRequests()" class="btn-refresh"><i class="fas fa-sync-alt"></i> Sync Data</button>
          <button onclick="clearAllRequests()" class="btn-clear"><i class="fas fa-trash-alt"></i> Wipe Records</button>
        </div>
      </header>
      
      <div class="stats-grid">
        <div class="stat-card total">
          <div class="stat-icon"><i class="fas fa-folder-open"></i></div>
          <div class="stat-info">
            <h3 id="totalRequests">0</h3>
            <p>Active SOS</p>
          </div>
        </div>
        <div class="stat-card fuel">
          <div class="stat-icon"><i class="fas fa-gas-pump"></i></div>
          <div class="stat-info">
            <h3 id="fuelRequests">0</h3>
            <p>Fuel Alerts</p>
          </div>
        </div>
        <div class="stat-card medical">
          <div class="stat-icon"><i class="fas fa-briefcase-medical"></i></div>
          <div class="stat-info">
            <h3 id="medicalRequests">0</h3>
            <p>Medical Alerts</p>
          </div>
        </div>
        <div class="stat-card guidance">
          <div class="stat-icon"><i class="fas fa-compass"></i></div>
          <div class="stat-info">
            <h3 id="guidanceRequests">0</h3>
            <p>Navigation</p>
          </div>
        </div>
      </div>
      
      <div class="card data-table-card">
        <div class="card-header">
          <h2><i class="fas fa-stream"></i> Incoming Distress Signals</h2>
          <span class="live-indicator"><span class="dot"></span> Live Feed</span>
        </div>
        <div id="requestsList" class="request-grid">
          </div>
      </div>
    </main>
  </div>

<script src="script.js"></script> 
<script>
  // DIRECT LOGIN FIX
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault(); // Stop the page from refreshing
    
    const pass = document.getElementById('adminPassword').value;
    const errorMsg = document.getElementById('loginError');

    // Check Password
    if (pass === 'admin123') {
      // Hide Login Screen
      document.getElementById('loginScreen').style.display = 'none';
      
      // Show Dashboard (using Flexbox to keep layout)
      document.getElementById('adminDashboard').style.display = 'flex';
      
      // Load data if the main script is ready
      if (typeof loadRequests === 'function') {
        loadRequests();
      }
    } else {
      // Show Error
      errorMsg.innerText = "❌ Incorrect Password";
      errorMsg.style.display = 'block';
    }
  });
</script>
</body>
</html></body>
</html>
